// Add playlist index
videos.forEach((v, i) => v.playlistIdx = i);

const grid = document.getElementById('grid');
const slider = document.getElementById('size-slider');
const sizeLabel = document.getElementById('size-label');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');
const sortBtns = document.querySelectorAll('.sort-btn');

let currentSort = 'playlist';

sortBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    sortBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    render();
  });
});

function getSorted(list) {
  if (currentSort === 'views') {
    return [...list].sort((a, b) => b.viewsN - a.viewsN);
  }
  return [...list].sort((a, b) => a.playlistIdx - b.playlistIdx);
}

function render() {
  grid.innerHTML = '';
  const q = searchInput.value.toLowerCase();
  const filtered = videos.filter(v => !q || v.title.toLowerCase().includes(q));
  const sorted = getSorted(filtered);

  sorted.forEach((v, rank) => {
    const card = document.createElement('div');
    card.className = 'card';
    const badgeText = currentSort === 'views'
      ? `#${rank + 1} · ${v.views}`
      : `#${v.playlistIdx + 1}`;
    card.innerHTML = `
      <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
        <div class="thumb-wrap">
          <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg"
               alt="${v.title.replace(/"/g,'&quot;')}"
               loading="lazy">
          <span class="badge-num">${badgeText}</span>
          ${currentSort === 'playlist' ? `<span class="badge-views">${v.views}</span>` : ''}
        </div>
        <div class="info">
          <div class="title">${v.title}</div>
        </div>
      </a>`;
    grid.appendChild(card);
  });

  countEl.textContent = `${sorted.length} / ${videos.length} videos`;
}

function updateSize(val) {
  grid.style.setProperty('--thumb-w', val + 'px');
  sizeLabel.textContent = val + 'px';
}

slider.addEventListener('input', () => updateSize(slider.value));
searchInput.addEventListener('input', render);

updateSize(slider.value);
render();
</script>
