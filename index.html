// Add playlist index
videos.forEach((v, i) => v.playlistIdx = i);

const grid = document.getElementById('grid');
const slider = document.getElementById('size-slider');
const sizeLabel = document.getElementById('size-label');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');
const sortBtns = document.querySelectorAll('.sort-btn');

let currentSort = 'playlist';

sortBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    sortBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    render();
  });
});

function getSorted(list) {
  if (currentSort === 'views') {
    return [...list].sort((a, b) => b.viewsN - a.viewsN);
  }
  return [...list].sort((a, b) => a.playlistIdx - b.playlistIdx);
}

function render() {
  grid.innerHTML = '';
  const q = searchInput.value.toLowerCase();
  const filtered = videos.filter(v => !q || v.title.toLowerCase().includes(q));
  const sorted = getSorted(filtered);

  sorted.forEach((v, rank) => {
    const card = document.createElement('div');
    card.className = 'card';
    const badgeText = currentSort === 'views'
      ? `#${rank + 1} · ${v.views}`
      : `#${v.playlistIdx + 1}`;
    card.dataset.id = v.id;
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg"
             alt="${v.title.replace(/"/g,'&quot;')}"
             loading="lazy">
        <span class="badge-num">${badgeText}</span>
        ${currentSort === 'playlist' ? `<span class="badge-views">${v.views}</span>` : ''}
        ${v.ab ? `<span class="badge-ab">A/B</span>` : ''}
      </div>
      <div class="info">
        <div class="title">${v.title}</div>
      </div>`;
    grid.appendChild(card);
  });

  countEl.textContent = `${sorted.length} / ${videos.length} videos`;
}

function updateSize(val) {
  grid.style.setProperty('--thumb-w', val + 'px');
  sizeLabel.textContent = val + 'px';
}

slider.addEventListener('input', () => updateSize(slider.value));
searchInput.addEventListener('input', render);

updateSize(slider.value);
render();

// Modal
const overlay = document.getElementById('ab-overlay');
const abTitleEl = document.getElementById('ab-title');
const abPeriodEl = document.getElementById('ab-period');
const abVariantsEl = document.getElementById('ab-variants');
const abMainThumb = document.getElementById('ab-main-thumb');
const abYtLink = document.getElementById('ab-yt-link');
const abViewsEl = document.getElementById('ab-views');
const abSectionWrap = document.getElementById('ab-section-wrap');

document.getElementById('ab-close').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

function openModal(v) {
  abMainThumb.src = `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`;
  abMainThumb.alt = v.title;
  abTitleEl.textContent = v.title;
  abViewsEl.textContent = v.views;
  abYtLink.href = `https://www.youtube.com/watch?v=${v.id}`;
  if (v.ab) {
    abSectionWrap.style.display = '';
    abPeriodEl.textContent = v.ab.period;
    abVariantsEl.innerHTML = v.ab.variants.map((vr, i) => {
      const pct = vr.watchTimeShare != null ? vr.watchTimeShare + '%' : '—';
      const barWidth = vr.watchTimeShare != null ? vr.watchTimeShare + '%' : '0%';
      return `<div class="ab-variant${vr.winner ? ' is-winner' : ''}">
        ${vr.winner ? '<span class="ab-winner-badge">Winner</span>' : ''}
        <img class="ab-thumb" src="${vr.thumbUrl}" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'" alt="Variant ${i+1}">
        <div class="ab-variant-title">${vr.title}</div>
        <div class="ab-bar-wrap"><div class="ab-bar-fill${vr.winner ? '' : ' loser'}" style="width:${barWidth}"></div></div>
        <div class="ab-pct">${pct}</div>
      </div>`;
    }).join('');
  } else {
    abSectionWrap.style.display = 'none';
  }
  overlay.classList.add('open');
}

document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const v = videos.find(v => v.id === id);
  if (!v) return;
  openModal(v);
});
</script>
